<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OCR 測試</title>
    <link href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .container { max-width: 800px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #result { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">⚙️ 輥輪組裝報表 OCR 分析</h2>
        
        <form id="uploadForm">
            <div class="mb-3">
                <label class="form-label fw-bold">Gemini 模型</label>
                <select class="form-select" id="modelSelect" name="model">
                    <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
                    <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">上傳報表圖檔 (jpg, png, pdf)</label>
                <input class="form-control" type="file" id="fileInput" name="file" accept=".jpg,.jpeg,.png,.pdf" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submitBtn">開始辨識</button>
        </form>

        <div id="loading" class="text-center mt-4" style="display: none;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-primary fw-bold">使用 Gemini 辨識中...</p>
        </div>

        <div id="result">
            <div class="alert alert-success fw-bold">✅ Gemini 辨識成功！</div>
            <button class="btn btn-success mb-3 w-100" id="downloadBtn">📥 下載 Excel 報表</button>
            <div class="accordion" id="accordionResult"></div>
            <hr>
            <p class="text-muted fw-bold">📋 原始 JSON</p>
            <pre><code id="jsonResult" class="bg-light p-3 d-block rounded" style="max-height: 300px; overflow-y: auto;"></code></pre>
        </div>
    </div>

    <script>
        let parsedData = null;

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const modelSelect = document.getElementById('modelSelect');
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            if (!fileInput.files.length) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('model', modelSelect.value);

            btn.disabled = true;
            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/api/ocr', { method: 'POST', body: formData });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || '伺服器錯誤');
                }

                parsedData = await response.json();
                renderResults(parsedData);
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
            } catch (error) {
                alert('❌ 辨識失敗: ' + error.message);
                loading.style.display = 'none';
            } finally {
                btn.disabled = false;
            }
        });

        function renderResults(data) {
            document.getElementById('jsonResult').textContent = JSON.stringify(data, null, 2);
            const accordion = document.getElementById('accordionResult');
            accordion.innerHTML = '';
            const categories = ["粗車", "再生", "精車", "軸位粗車", "軸位再生", "軸位精車", "圓度"];
            
            categories.forEach((cat, index) => {
                const typesDict = data[cat] || {};
                let totalCount = 0;
                let contentHtml = '';

                for (const [rType, rollers] of Object.entries(typesDict)) {
                    const keys = Object.keys(rollers);
                    if (keys.length > 0) {
                        totalCount += keys.length;
                        contentHtml += `<strong>🔹 型號：${rType}</strong><br>`;
                        for (const [rId, size] of Object.entries(rollers)) {
                            const displayId = rId.split('_')[0];
                            contentHtml += `　- <code>${displayId}</code> → <strong>${size}</strong><br>`;
                        }
                    }
                }

                const headerText = totalCount > 0 ? `<strong>${cat}</strong>（${totalCount} 件）` : `${cat}（無施做）`;
                const showClass = totalCount > 0 ? 'show' : '';
                const buttonClass = totalCount > 0 ? '' : 'collapsed';
                const bodyContent = totalCount > 0 ? contentHtml : '<span class="text-muted">本次無此項目。</span>';

                const itemHtml = `
                    <div class="accordion-item">
                        <h2 class="accordion-header" id="heading${index}">
                            <button class="accordion-button ${buttonClass}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}">
                                ${headerText}
                            </button>
                        </h2>
                        <div id="collapse${index}" class="accordion-collapse collapse ${showClass}" data-bs-parent="#accordionResult">
                            <div class="accordion-body">${bodyContent}</div>
                        </div>
                    </div>
                `;
                accordion.innerHTML += itemHtml;
            });
        }

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            if (!parsedData) return;
            
            try {
                const response = await fetch('/api/export-excel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(parsedData)
                });

                if (!response.ok) throw new Error('Excel 匯出失敗');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '軋輥組裝報表整理.xlsx';
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                alert('❌ ' + error.message);
            }
        });
    </script>
    <script src="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js)"></script>
</body>
</html>
